<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cheatsheets Repository</title>
</head>
<body>

    <!-- Navigation -->
    <nav>
        <div class="nav-brand" onclick="navigateHome()">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
            </svg>
            Cheatsheets
        </div>
        <div class="nav-actions">
            <button id="theme-toggle" class="icon-btn" aria-label="Toggle Theme">
                <!-- Sun Icon (Default Hidden) -->
                <svg id="icon-sun" class="hidden" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <!-- Moon Icon -->
                <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>
        </div>
    </nav>

    <!-- Main App Container -->
    <main id="app-container">
        
        <!-- View 1: List of Documents -->
        <div id="list-view">
            <div class="header-section">
                <h1>Available Cheatsheets</h1>
                <p>Select a document to view its contents.</p>
            </div>
            <div class="doc-list" id="doc-list">
                <!-- Items will be injected here by JS -->
            </div>
        </div>

        <!-- View 2: PDF Viewer -->
        <div id="viewer-view">
            <div class="viewer-header">
                <button class="btn-back" onclick="navigateHome()">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="19" y1="12" x2="5" y2="12"></line>
                        <polyline points="12 19 5 12 12 5"></polyline>
                    </svg>
                    Back to list
                </button>
                <div class="viewer-title" id="viewer-title">Document Title</div>
                <div style="width: 100px;"></div> <!-- Spacer for flex centering -->
            </div>
            <div class="pdf-container" id="pdf-container">
                <!-- Iframe will be injected here -->
            </div>
        </div>

    </main>

</body>
</html>
